spring.application.name=mall-backend
server.port=8080

# MySQL 数据库
spring.datasource.url=jdbc:mysql://localhost:3306/mall?useSSL=false&serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=123456

# MyBatis-Plus
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=com.mall.backend.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Jackson JSON
spring.jackson.serialization.write-dates-as-timestamps=false

# ===================== Knife4j / SpringDoc 接口文档配置 =====================
# OpenAPI 规范版本（OPENAPI_3_0 或 OPENAPI_3_1）
springdoc.api-docs.version=OPENAPI_3_0
# API 文档路径
springdoc.api-docs.path=/v3/api-docs
# Swagger UI 路径
springdoc.swagger-ui.path=/swagger-ui.html
# Knife4j 增强
knife4j.enable=true
# Knife4j 生产环境配置（设置为 true 可禁用文档）
knife4j.production=false
